<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>投資用語集 — プロ水準辞典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF6EE;--cream2:#F7EDE0;--cream3:#EFE0CC;
  --amber-light:#FAE5C4;--amber:#E8A055;--amber-dark:#C4782A;
  --brown:#7A4F2D;--brown-dark:#4A2E18;
  --rust:#C25A2A;--rust-light:#F5E4D8;
  --gold-light:#FBF0D8;
  --red-soft:#C24A3A;--red-bg:#FAE8E4;
  --green-warm:#6B8A4E;--green-bg:#EAF0E2;
  --teal-warm:#4A7A6D;--teal-bg:#E2EDE9;
  --text-main:#3A2510;--text-sub:#7A5A3A;--text-hint:#A8845E;
  --border:rgba(122,79,45,0.15);--border-med:rgba(122,79,45,0.28);
  --shadow-hover:0 6px 24px rgba(122,79,45,0.15);
  --radius:10px;--radius-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text-main);min-height:100vh;line-height:1.7;-webkit-text-size-adjust:100%;}

/* Header */
.header{background:var(--brown-dark);padding:1.75rem 1.25rem 1.5rem;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.02) 20px,rgba(255,255,255,0.02) 21px);}
.header-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;color:#FBF0D8;letter-spacing:.05em;position:relative;}
.header-sub{font-size:11px;color:var(--amber);margin-top:5px;letter-spacing:.1em;position:relative;}
.header-count{font-size:11px;color:rgba(251,240,216,0.45);margin-top:3px;position:relative;}

/* Sticky bar */
.bar{background:var(--cream2);border-bottom:1px solid var(--border);padding:.75rem 1rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(122,79,45,0.08);}

/* Search */
.search-wrap{display:flex;align-items:center;gap:8px;background:white;border:1px solid var(--border-med);border-radius:var(--radius);padding:0 12px;margin-bottom:8px;}
.search-wrap svg{color:var(--text-hint);flex-shrink:0;width:15px;height:15px;}
.search-wrap input{flex:1;border:none;outline:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text-main);padding:9px 0;min-width:0;}
.search-wrap input::placeholder{color:var(--text-hint);}
.result-count{font-size:11px;color:var(--text-hint);flex-shrink:0;white-space:nowrap;}

/* Sort row */
.sort-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.sort-row::-webkit-scrollbar{display:none;}
.sort-label{font-size:11px;color:var(--text-hint);flex-shrink:0;}
.sort-btn{flex-shrink:0;padding:4px 11px;font-family:'Noto Sans JP',sans-serif;font-size:11px;border:1px solid var(--border-med);border-radius:20px;background:white;color:var(--text-sub);cursor:pointer;transition:all .15s;white-space:nowrap;}
.sort-btn:hover{background:var(--amber-light);border-color:var(--amber);}
.sort-btn.on{background:var(--amber-dark);color:white;border-color:var(--amber-dark);}

/* Category scroll */
.cat-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;-webkit-overflow-scrolling:touch;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:4px 11px;font-family:'Noto Sans JP',sans-serif;font-size:11px;border:1px solid var(--border-med);border-radius:20px;background:white;color:var(--text-sub);cursor:pointer;transition:all .15s;white-space:nowrap;}
.cat-btn:hover{background:var(--amber-light);border-color:var(--amber);}
.cat-btn.on{background:var(--brown);color:white;border-color:var(--brown);}

/* Main content */
.main{max-width:820px;margin:0 auto;padding:1.25rem .875rem 4rem;}
.term-list{display:flex;flex-direction:column;gap:7px;}

/* Group header */
.grp-hdr{font-size:10px;font-weight:500;color:var(--text-hint);letter-spacing:.1em;padding:10px 4px 4px;border-bottom:1px solid var(--border);margin-bottom:3px;}

/* Card */
.card{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow .2s;}
.card.open{border-color:var(--amber);}
.card-head{display:flex;align-items:flex-start;gap:8px;padding:11px 13px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.card-head:active{background:var(--cream);}
.card-names{flex:1;min-width:0;}
.card-name{font-size:13.5px;font-weight:500;color:var(--text-main);line-height:1.4;}
.card-en{font-size:10.5px;color:var(--text-hint);margin-top:1px;font-family:'DM Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;max-width:160px;margin-top:1px;}
.badge{font-size:10px;padding:2px 6px;border-radius:9px;white-space:nowrap;font-weight:500;line-height:1.4;}
.b-must{background:#FAE8E4;color:#8A2A1A;}
.b-imp{background:var(--amber-light);color:var(--amber-dark);}
.b-mid{background:var(--cream3);color:var(--brown);}
.b-adv{background:#EDE8FA;color:#4A3A7A;}
.b-new{background:var(--green-bg);color:var(--green-warm);}
.bc-積立{background:var(--green-bg);color:#3A6030;}
.bc-バリュ{background:#E8F0FA;color:#2A4A7A;}
.bc-企業{background:var(--teal-bg);color:var(--teal-warm);}
.bc-マクロ{background:#EDE8FA;color:#4A3A7A;}
.bc-デリバ{background:var(--rust-light);color:var(--rust);}
.bc-テクニ{background:#E8F0FA;color:#2A4A7A;}
.bc-為替{background:var(--teal-bg);color:var(--teal-warm);}
.bc-暗号{background:var(--gold-light);color:#7A5A10;}
.bc-心理{background:var(--cream3);color:var(--brown);}
.bc-リスク{background:var(--red-bg);color:var(--red-soft);}
.bc-オルタ{background:var(--amber-light);color:var(--amber-dark);}
.bc-アノ{background:#FBF0D8;color:#7A5A10;}
.bc-格言{background:#F5E8FA;color:#5A2A7A;}
.bc-トレ{background:#E4F5F0;color:#1A6050;}
.chevron{width:16px;height:16px;flex-shrink:0;color:var(--text-hint);transition:transform .2s;margin-top:3px;}
.card.open .chevron{transform:rotate(180deg);}

/* Card body */
.card-body{display:none;border-top:1px solid var(--border);padding:0 13px 13px;}
.card.open .card-body{display:block;}
.sec{margin-top:12px;}
.sec-label{font-size:10px;font-weight:500;color:var(--text-hint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.sec-text{font-size:13px;color:var(--text-sub);line-height:1.8;}
.formula{font-family:'DM Mono',monospace;font-size:11.5px;background:var(--cream2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;color:var(--text-main);line-height:1.7;white-space:pre-wrap;margin-top:5px;overflow-x:auto;}
.vs-box{background:var(--teal-bg);border-radius:var(--radius);padding:8px 11px;margin-top:9px;font-size:12px;color:#2A5A4A;line-height:1.75;}
.vs-box strong{color:var(--teal-warm);}
.warn-box{background:var(--amber-light);border-radius:var(--radius);padding:8px 11px;margin-top:9px;font-size:12px;color:#6A3A10;line-height:1.75;}
.warn-box strong{color:var(--amber-dark);}
.limit-box{background:var(--red-bg);border-radius:var(--radius);padding:8px 11px;margin-top:9px;font-size:12px;color:#6A1A10;line-height:1.75;}
.limit-box strong{color:var(--red-soft);}
.quote-box{background:var(--gold-light);border-left:3px solid var(--amber);border-radius:0 var(--radius) var(--radius) 0;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--brown-dark);line-height:1.8;font-style:italic;}
.related-row{margin-top:9px;font-size:12px;color:var(--text-hint);}
.rel-link{color:var(--amber-dark);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(196,120,42,0.35);margin-right:7px;display:inline-block;line-height:1.8;}

.empty{text-align:center;padding:3rem 1rem;color:var(--text-hint);font-size:14px;}
.footer{text-align:center;padding:1.25rem;font-size:11px;color:var(--text-hint);border-top:1px solid var(--border);}

@media(min-width:600px){
  .header-title{font-size:26px;}
  .card-name{font-size:14px;}
  .card-head{padding:13px 16px;}
  .card-body{padding:0 16px 16px;}
  .main{padding:1.5rem 1rem 4rem;}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">投資用語集</div>
  <div class="header-sub">PRO-LEVEL INVESTMENT GLOSSARY</div>
  <div class="header-count" id="total-count"></div>
</div>
<div class="bar">
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" placeholder="用語を検索（PER、格言、アノマリーなど）">
    <span class="result-count" id="cnt"></span>
  </div>
  <div class="sort-row">
    <span class="sort-label">並び順：</span>
    <button class="sort-btn on" id="s-imp" onclick="setSort('imp')">重要度</button>
    <button class="sort-btn" id="s-kana" onclick="setSort('kana')">あいうえお</button>
    <button class="sort-btn" id="s-cat" onclick="setSort('cat')">カテゴリ</button>
  </div>
  <div class="cat-scroll" id="cats"></div>
</div>
<div class="main">
  <div class="term-list" id="list"></div>
  <div class="empty" id="empty" style="display:none;">一致する用語が見つかりませんでした。</div>
</div>
<div class="footer" id="footer-txt"></div>
<script>
const TERMS=[
/* ========== 基礎 ========== */
{id:"inflation",name:"インフレ（インフレーション）",en:"Inflation",cat:"マクロ経済",imp:"基礎",impN:1,kana:"いんふれ",
def:"物価が継続的に上昇する現象。通貨の実質的な購買力が下がる。需要超過（ディマンドプル）と供給不足・コスト上昇（コストプッシュ）の2種類があり、対処法が異なる。エネルギー価格上昇は典型的なコストプッシュ型。",
formula:"インフレ率 = (今年のCPI − 前年のCPI) ÷ 前年のCPI × 100\nFRBのターゲット：2%前後",
warn:"名目リターンとインフレ率の差が「実質リターン」。インフレ5%の環境で株が年3%上昇しても実質マイナス2%になる。",
vs:"【ディマンドプル vs コストプッシュ】ディマンドプル＝需要過多が原因（金利引き上げで抑制できる）/ コストプッシュ＝供給側が原因（金利引き上げでは解決しにくく景気を冷やすだけになるリスク）",
related:["デフレ","スタグフレーション","CPI","金利","PCEデフレーター"]},

{id:"deflation",name:"デフレ（デフレーション）",en:"Deflation",cat:"マクロ経済",imp:"基礎",impN:1,kana:"でふれ",
def:"物価が継続的に下落する現象。「今買わず待てば安くなる」という心理が需要を抑制し、企業収益悪化→賃下げ→さらに需要減というデフレスパイラルに陥るリスクがある。日本が1990年代〜2010年代に経験した構造問題。",
warn:"デフレ期は現金の実質価値が上昇するため株・不動産より現金保有が有利になりやすい。",
vs:"【インフレ vs デフレ vs スタグフレーション】インフレ＝景気過熱・物価上昇 / デフレ＝景気停滞・物価下落 / スタグフレーション＝景気停滞+物価上昇（最悪の組み合わせ）",
related:["インフレ","スタグフレーション","金利"]},

{id:"gdp",name:"GDP（国内総生産）",en:"Gross Domestic Product",cat:"マクロ経済",imp:"基礎",impN:1,kana:"じーでぃーぴー",
def:"一定期間内に国内で生産されたすべての財・サービスの付加価値の合計。経済規模を表す最も基本的な指標。2四半期連続マイナスが景気後退の定義として使われることが多い。",
formula:"GDP = 消費 + 投資 + 政府支出 + 純輸出\n年率2%以上：良好 / 0〜2%：停滞 / マイナス：景気後退",
related:["インフレ","バフェット指数","スタグフレーション"]},

{id:"interest_rate",name:"金利（政策金利・長短金利）",en:"Interest Rate / Fed Funds Rate",cat:"マクロ経済",imp:"基礎",impN:1,kana:"きんり",
def:"お金を貸す対価として支払われる利率。FRBが設定する政策金利（FF金利）は短期金利の基準。長期金利（10年国債利回り）は市場が決定し、将来のインフレ・成長期待を反映する。株式のバリュエーションに直接影響する。",
formula:"DCF理論：将来利益 ÷ 金利（割引率） = 現在価値\n金利↑ → 割引率↑ → 理論株価↓（特に高PER・成長株に影響大）",
warn:"短期金利＞長期金利（逆イールド）は景気後退のシグナルとして知られる。過去の逆イールドから平均12〜18ヶ月後に景気後退が訪れている。",
related:["インフレ","ERP","逆イールド","デュレーション","TIPS"]},

{id:"per",name:"PER（株価収益率）",en:"Price-to-Earnings Ratio",cat:"バリュエーション",imp:"基礎",impN:1,kana:"ぴーいーあーる",
def:"株価がEPSの何倍かを示す指標。「今の利益水準が続くとすれば何年で株価を回収できるか」を表す。過去12ヶ月実績EPSを使うものをトレーリングPER、予測EPSを使うものをフォワードPERと呼ぶ。S&P500の歴史的平均は約16〜17倍。",
formula:"PER = 株価 ÷ EPS（過去12ヶ月実績）\n歴史的平均：16〜17倍 / 現在S&P500：約24〜27倍",
warn:"景気後退期はEPSが急落してPERが急上昇する「不況高PER」現象が起きる。",
vs:"【トレーリングPER vs フォワードPER vs CAPE】トレーリング＝過去実績（客観的だが遅行）/ フォワード＝将来予測（先行するが楽観バイアスあり）/ CAPE＝10年平均（最も信頼性高い長期指標）",
related:["フォワードPER","CAPE","EPS","益利回り","PBR","PEGレシオ"]},

{id:"eps",name:"EPS（1株あたり利益）",en:"Earnings Per Share",cat:"バリュエーション",imp:"基礎",impN:1,kana:"いーぴーえす",
def:"企業の純利益を発行済み株式数で割った数値。単体では意味が薄く、PER（倍率）や益利回り（%）に変換して初めて割高割安の判断材料になる。",
formula:"EPS = 純利益 ÷ 発行済み株式数\n例：純利益1,000億円、株式1億株 → EPS 1,000円",
warn:"GAAPとNon-GAAP（調整後）の2種類がある。Non-GAAPは実態より20〜30%水増しになりやすい。自社株買いでも分母が減りEPSが上昇する。",
related:["EPS成長率","益利回り","PER","フォワードPER","FCF"]},

{id:"dca",name:"DCA（ドルコスト平均法）",en:"Dollar Cost Averaging",cat:"積立・購入戦術",imp:"基礎",impN:1,kana:"どるこすとへいきんほう",
def:"一定期間ごとに一定金額を機械的に購入し続ける積立手法。価格が高い時は少量、安い時は多量を自動的に購入するため平均取得コストを平準化できる。感情的な売買を排除できる点が最大の利点。",
formula:"平均取得コスト = 投資総額 ÷ 累計購入株数\n例：毎月5万円 × 12ヶ月 = 60万円を12回に分割",
warn:"上昇トレンドでは一括投資の方がリターンが高い。DCAは「下落への保険」であり、期待リターン最大化手法ではない。",
vs:"【DCA vs 一括投資 vs VA】Vanguard調査では3分の2の局面で一括投資がDCAに勝る。ただしリスク許容度が低い場合・高値圏で買う場合はDCAが心理的に合理的。",
related:["バリュー平均法","一括投資","200DMA乖離率戦略","TAA"]},

{id:"risk_on",name:"リスクオン / リスクオフ",en:"Risk-on / Risk-off",cat:"市場心理・アノマリー",imp:"基礎",impN:1,kana:"りすくおん",
def:"市場全体の「空気感」を表す概念。リスクオンは株・コモディティ・新興国資産を積極的に買う局面。リスクオフは不安・恐怖が高まり、金・国債・円などの安全資産に逃避する局面。",
warn:"リスクオフ時は通常は無相関の資産が同時下落する「相関の収束」が起きる。分散投資が機能しにくくなる局面。",
related:["VIX","キャリートレード・巻き戻し","金","分散投資・相関係数"]},

{id:"drawdown",name:"ドローダウン / 最大ドローダウン",en:"Drawdown / Maximum Drawdown",cat:"リスク管理",imp:"基礎",impN:1,kana:"どろーだうん",
def:"高値から現在価格までの下落幅（%）。最大ドローダウン（MDD）は特定期間中の最悪の下落幅。「この投資戦略に自分が耐えられるか」を事前に確認するための最重要リスク指標。",
formula:"ドローダウン = (現在価格 − 直近高値) ÷ 直近高値 × 100\n例：高値100万円 → 現在70万円 → ドローダウン −30%",
warn:"「自分が耐えられる最大ドローダウン」を先に決め、そこから逆算して投資額を設計することが重要。狼狽売りが最もリターンを損ねるパターン。",
related:["シャープレシオ","レバレッジ","DCA","分散投資・相関係数"]},

{id:"diversification",name:"分散投資 / 相関係数",en:"Diversification / Correlation",cat:"リスク管理",imp:"基礎",impN:1,kana:"ぶんさんとうし",
def:"複数の資産に分けて投資することでリスクを軽減する手法。相関係数が低い資産を組み合わせることで全体の変動を抑えられる。",
formula:"相関係数：−1（逆の動き）〜0（無相関）〜+1（同じ動き）\n株＋金：比較的低相関 / 株＋BTC：高相関（リスクオフ時は特に）",
warn:"平時は無相関でも危機時は株・BTC・コモディティが同時下落する「相関の収束」が起きる。",
related:["リスクオン/オフ","ドローダウン","シャープレシオ","金"]},

/* ========== 重要 ========== */
{id:"cape",name:"CAPE（シラーPER）",en:"Cyclically Adjusted P/E",cat:"バリュエーション",imp:"重要",impN:2,kana:"けいぷ",
def:"過去10年の実質（インフレ調整済み）平均EPSで割ったPER。景気サイクルの波を均すことで長期の割高割安を判断できる。ノーベル賞経済学者シラーが考案。現在約39〜41倍は1929年・2000年と同水準。",
formula:"CAPE = 現在株価 ÷ 過去10年インフレ調整済みEPS平均\n歴史的平均：約17倍 / 1929年ピーク：32倍 / 2000年ピーク：44倍",
limit:"タイミングを教えてくれない。1990年代後半はCAPE30倍超でも4年間上昇が続いた。「割高かどうか」は示すが「いつ下がるか」は不明。",
related:["PER","フォワードPER","バフェット指数","ERP","益利回り"]},

{id:"erp",name:"ERP（株式リスクプレミアム）",en:"Equity Risk Premium",cat:"バリュエーション",imp:"重要",impN:2,kana:"いーあーるぴー",
def:"株式投資の期待リターンから無リスク金利（国債利回り）を引いた「リスクを取る見返り」。ERPがマイナスは「リスクを取っても国債より期待リターンが低い」という異常事態。",
formula:"ERP = 益利回り(1÷CAPE) − 10年国債利回り\n現在（2026年5月）：2.5% − 4.3% ≈ −1.8%（異常なマイナス）",

{id:"yield_curve",name:"逆イールド（イールドカーブ）",en:"Inverted Yield Curve",cat:"マクロ経済",imp:"中級",impN:3,kana:"ぎゃくいーるど",

{id:"option",name:"オプション取引（コール・プット）",en:"Options — Call / Put",cat:"デリバティブ",imp:"中級",impN:3,kana:"おぷしょんとりひき",
def:"「将来のある時点で特定の価格で資産を売買する権利」を売買する取引。買う権利（コール）と売る権利（プット）がある。ヘッジ（保険）としても投機にも使えるが、仕組みの理解なしに使うと大損リスクがある。",

{id:"dma200_str",name:"200DMA乖離率戦略",en:"200-Day MA Deviation Strategy",cat:"積立・購入戦術",imp:"中級",impN:3,kana:"にひゃくでぃーえむえーかいりりつ",

{id:"va",name:"バリュー平均法（VA）",en:"Value Averaging",cat:"積立・購入戦術",imp:"中級",impN:3,kana:"ばりゅーへいきんほう",

{id:"leverage",name:"レバレッジ / ボラティリティディケイ",en:"Leverage / Volatility Decay",cat:"リスク管理",imp:"中級",impN:3,kana:"ればれっじ",

const CATS=["すべて","現代トレンド・戦略","積立・購入戦術","バリュエーション","企業分析","マクロ経済","デリバティブ","テクニカル","為替・債券","暗号資産","市場心理・アノマリー","有名投資家の格言","リスク管理","オルタナティブ"];
const CAT_PREFIX={"現代トレンド・戦略":"bc-トレ","積立・購入戦術":"bc-積立","バリュエーション":"bc-バリュ","企業分析":"bc-企業","マクロ経済":"bc-マクロ","デリバティブ":"bc-デリバ","テクニカル":"bc-テクニ","為替・債券":"bc-為替","暗号資産":"bc-暗号","市場心理・アノマリー":"bc-アノ","有名投資家の格言":"bc-格言","リスク管理":"bc-リスク","オルタナティブ":"bc-オルタ"};
const IMP_CLS={"基礎":"b-must","重要":"b-imp","中級":"b-mid","専門":"b-adv"};
const IMP_LABELS={"基礎":"基礎 — まず覚える","重要":"重要 — 実践で使う","中級":"中級 — 深く理解する","専門":"専門 — プロ水準"};

let activeCat="すべて", activeSort="imp", openId=null;

document.getElementById("total-count").textContent="全"+TERMS.length+"用語 · "+(CATS.length-1)+"カテゴリ収録";
document.getElementById("footer-txt").textContent="全"+TERMS.length+"用語 · 14カテゴリ · アノマリー・格言・トレンド用語収録";

function buildCats(){
  const el=document.getElementById("cats");
  CATS.forEach(c=>{
    const cnt=c==="すべて"?TERMS.length:TERMS.filter(t=>t.cat===c).length;
    const btn=document.createElement("button");
    btn.className="cat-btn"+(c==="すべて"?" on":"");
    btn.textContent=c+" "+cnt;
    btn.onclick=()=>{
      activeCat=c;
      document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("on"));
      btn.classList.add("on");
      openId=null; render();
    };
    el.appendChild(btn);
  });
}

function setSort(s){
  activeSort=s;
  ["imp","kana","cat"].forEach(k=>{
    document.getElementById("s-"+k).classList.toggle("on",k===s);
  });
  openId=null; render();
}

function sortTerms(terms){
  if(activeSort==="imp") return terms.sort((a,b)=>a.impN!==b.impN?a.impN-b.impN:a.name.localeCompare(b.name,"ja"));
  if(activeSort==="kana") return terms.sort((a,b)=>a.kana.localeCompare(b.kana,"ja"));
  if(activeSort==="cat") return terms.sort((a,b)=>{
    const ci=CATS.indexOf(a.cat)-CATS.indexOf(b.cat);
    return ci!==0?ci:a.impN-b.impN;
  });
  return terms;
}

function render(){
  const q=(document.getElementById("q").value||"").trim().toLowerCase();
  let terms=[...TERMS];
  if(activeCat!=="すべて") terms=terms.filter(t=>t.cat===activeCat);
  if(q) terms=terms.filter(t=>(t.name+t.en+(t.def||"")+(t.formula||"")+(t.vs||"")+(t.quote||"")).toLowerCase().includes(q));
  terms=sortTerms(terms);
  document.getElementById("cnt").textContent=terms.length+"件";
  const list=document.getElementById("list");
  list.innerHTML="";
  document.getElementById("empty").style.display=terms.length?"none":"block";

  let lastGrp=null;
  terms.forEach(t=>{
    if(activeSort==="imp"&&!q){
      const grp=t.imp;
      if(grp!==lastGrp){
        lastGrp=grp;
        const gh=document.createElement("div");
        gh.className="grp-hdr";
        gh.textContent=IMP_LABELS[grp]||grp;
        list.appendChild(gh);
      }
    }
    const card=document.createElement("div");
    card.className="card"+(openId===t.id?" open":"");
    card.id="card-"+t.id;
    const newBadge=t.isNew?`<span class="badge b-new">NEW</span>`:"";
    const catCls=CAT_PREFIX[t.cat]||"";

    let body="";
    if(t.def) body+=`<div class="sec"><div class="sec-label">定義・概要</div><div class="sec-text">${t.def}</div></div>`;
    if(t.quote) body+=`<div class="quote-box">${t.quote.replace(/\n/g,"<br>")}</div>`;
    if(t.formula) body+=`<div class="sec"><div class="sec-label">計算式・数値目安</div><div class="formula">${t.formula}</div></div>`;
    if(t.vs) body+=`<div class="vs-box"><strong>類似用語との違い：</strong>${t.vs}</div>`;
    if(t.warn) body+=`<div class="warn-box"><strong>注意点：</strong>${t.warn}</div>`;
    if(t.limit) body+=`<div class="limit-box"><strong>限界・誤解されやすい点：</strong>${t.limit}</div>`;
    if(t.related) body+=`<div class="related-row">関連用語：${t.related.map(r=>`<span class="rel-link" onclick="searchRel('${r}')">${r}</span>`).join("")}</div>`;

    card.innerHTML=`
      <div class="card-head" onclick="toggle('${t.id}')">
        <div class="card-names">
          <div class="card-name">${t.name}${newBadge}</div>
          <div class="card-en">${t.en}</div>
        </div>
        <div class="badges">
          <span class="badge ${IMP_CLS[t.imp]}">${t.imp}</span>
          <span class="badge ${catCls}">${t.cat}</span>
        </div>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body">${body}</div>`;
    list.appendChild(card);
  });
}

function toggle(id){
  openId=(openId===id)?null:id;
  document.querySelectorAll(".card").forEach(c=>{
    c.classList.toggle("open",c.id==="card-"+openId);
  });
}

function searchRel(name){
  document.getElementById("q").value=name;
  activeCat="すべて";
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("on"));
  document.querySelector(".cat-btn").classList.add("on");
  openId=null; render();
  window.scrollTo({top:0,behavior:"smooth"});
}

document.getElementById("q").addEventListener("input",render);
buildCats();
render();
</script>
</body>
</html>
